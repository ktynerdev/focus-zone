<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Focus Zone: Rule Runner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="gameWrap">
      <canvas id="game"></canvas>

      <div id="topHud">
        <div class="pill" id="roundPill">Round 1</div>
        <div class="pill highlight" id="rulePill">Collect Stars</div>
        <div class="pill" id="scorePill">Score 0</div>
      </div>

      <div id="bottomHud">
        <div class="pill" id="zonePill">Zone Stable</div>
        <div class="pill" id="timePill">Time 30</div>
        <div class="pill" id="statusPill">Get Ready</div>
      </div>

      <div id="startOverlay" class="overlay">
        <div class="panel">
          <div class="eyebrow">Focus Zone</div>
          <h1>Rule Runner</h1>
          <p class="subtitle">
            Stay inside the shrinking zone. Collect the correct targets. Avoid the wrong ones.
          </p>
          <button id="startBtn" class="actionBtn" type="button">Start Game</button>
        </div>
      </div>

      <div id="summaryOverlay" class="overlay hidden">
        <div class="panel">
          <div class="eyebrow">Round Complete</div>
          <h2 id="summaryTitle">Nice Work</h2>
          <div id="summaryStats" class="summaryStats"></div>
          <div class="summaryButtons">
            <button id="nextRoundBtn" class="actionBtn" type="button">Next Round</button>
            <button id="restartBtn" class="secondaryBtn" type="button">Restart</button>
          </div>
        </div>
      </div>
    </div>

    <div id="touchControls">
      <div id="joystickBase">
        <div id="joystickKnob"></div>
      </div>

      <div id="actionButtons">
        <button class="touchBtn" id="pauseBtn" type="button">Pause</button>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
